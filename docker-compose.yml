services:
  mysql:
    image: mysql:8.4
    container_name: diagnosi-ia-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: diagnosi_ia
      MYSQL_USER: diagnosi_user
      MYSQL_PASSWORD: diagnosi_password
      MYSQL_ROOT_PASSWORD: diagnosi_root_password
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - diagnosi_ia_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u diagnosi_user --password=diagnosi_password --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: diagnosi-ia-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "127.0.0.1:8080:80"

volumes:
  diagnosi_ia_mysql_data:
